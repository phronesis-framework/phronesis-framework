name: PR CI

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------- Format / Quality (siempre) ----------
  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            El subject del PR no debe empezar en may\u00fascula.

  commit-lint:
    name: Commit messages lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  format:
    name: Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - run: uv run ruff format --check .

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - run: uv run ruff check --output-format=github .

  types:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - run: uv run mypy src

  # ---------- Tests + Coverage ----------
  test-coverage:
    name: Tests + Coverage (line >=90, branch >=85)
    runs-on: ubuntu-latest
    needs: [format, lint, types]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - name: Run pytest with coverage
        run: |
          uv run pytest \
            --cov=src/phronesis \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90
      - name: Enforce branch coverage threshold
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET, sys
          root = ET.parse('coverage.xml').getroot()
          branch = float(root.get('branch-rate', 0)) * 100
          print(f'Branch coverage: {branch:.2f}%')
          sys.exit(0 if branch >= 85 else 1)
          "
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
          retention-days: 7

  # ---------- Security ----------
  secrets-scan:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Solo en PR -> main ----------
  build:
    name: Build (sdist + wheel)
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    needs: [test-coverage, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14
