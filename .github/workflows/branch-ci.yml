name: Branch CI (fast)

on:
  push:
    branches:
      - "feat/**"
      - "feats/**"
      - "feature/**"
      - "fix/**"
      - "bugfix/**"
      - "hotfix/**"
      - "release/**"
      - "refactor/**"
      - "perf/**"
      - "docs/**"
      - "test/**"
      - "build/**"
      - "ci/**"
      - "chore/**"
      - "chores/**"
      - "style/**"
      - "revert/**"

concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - run: uv run ruff format --check .

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - run: uv run ruff check .

  types:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
        with:
          extras: "dev,obs"
      - run: uv run mypy src

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [format, lint, types]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
        with:
          extras: "dev,obs"
      - run: uv run pytest -x --no-cov
