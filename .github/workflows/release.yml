name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write  # PyPI trusted publishing (OIDC)

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-uv

      - name: Resolve version from tag
        id: ver
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Releasing $VER"

      - name: Sync pyproject and __version__ with tag
        run: |
          VER="${{ steps.ver.outputs.version }}"
          python - <<PY
          import pathlib, re
          ver = "$VER"
          p = pathlib.Path("pyproject.toml")
          p.write_text(
              re.sub(r'^version = ".*"', f'version = "{ver}"', p.read_text(encoding="utf-8"), count=1, flags=re.M),
              encoding="utf-8",
          )
          q = pathlib.Path("src/phronesis/__init__.py")
          q.write_text(
              re.sub(r'__version__ = ".*"', f'__version__ = "{ver}"', q.read_text(encoding="utf-8"), count=1),
              encoding="utf-8",
          )
          PY

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
