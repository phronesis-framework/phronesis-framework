global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: phronesis-prod

storage:
  tsdb:
    out_of_order_time_window: 30m

otlp:
  promote_resource_attributes:
    - service.name
    - service.namespace
    - service.instance.id
    - deployment.environment

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
