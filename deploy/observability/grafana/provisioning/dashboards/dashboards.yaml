apiVersion: 1

providers:
  - name: phronesis
    orgId: 1
    folder: Phronesis
    folderUid: phronesis
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
