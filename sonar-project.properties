sonar.projectKey=phronesis-framework_phronesis-framework
sonar.organization=phronesis-framework
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=phronesis-framework
sonar.projectVersion=0.1.0

# Sources / tests
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=tests/**/*,**/__init__.py

# SCM
sonar.scm.provider=git
